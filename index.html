<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="pageTitle">Dart Checkout Trainer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Mobile menu overlay -->
    <div class="menu-overlay" id="menu-overlay"></div>

    <!-- Top Navigation -->
    <header class="topnav" id="topnav">
        <div class="topnav-inner">

            <!-- Brand (left) -->
            <div class="topnav-brand">
                <div class="logo-icon">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="24" cy="24" r="22" stroke="#ff5a1f" stroke-width="2" fill="none" opacity="0.3"/>
                        <circle cx="24" cy="24" r="16" stroke="#ff5a1f" stroke-width="2" fill="none" opacity="0.5"/>
                        <circle cx="24" cy="24" r="10" stroke="#ff5a1f" stroke-width="2" fill="none" opacity="0.7"/>
                        <circle cx="24" cy="24" r="4" fill="#ff5a1f"/>
                        <line x1="40" y1="8" x2="27" y2="21" stroke="#ff5a1f" stroke-width="2.5" stroke-linecap="round"/>
                        <polygon points="40,8 36,9 39,12" fill="#ff5a1f"/>
                        <line x1="40" y1="8" x2="44" y2="4" stroke="#e0e0e0" stroke-width="1.5" stroke-linecap="round"/>
                        <line x1="43" y1="5" x2="46" y2="3" stroke="#e0e0e0" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="brand-text">
                    <span class="brand-main">Dart Checkout</span>
                    <span class="brand-sub">Trainer</span>
                </div>
            </div>

            <!-- Nav links (center, desktop) -->
            <nav class="topnav-links">
                <button class="nav-item" id="nav-play" data-screen="play-setup">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                        <polygon points="6,3 20,12 6,21" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                    </svg>
                    <span data-i18n="navPlay">Play</span>
                </button>
                <button class="nav-item active" id="nav-train" data-screen="game">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
                        <circle cx="12" cy="12" r="6" stroke="currentColor" stroke-width="1.5"/>
                        <circle cx="12" cy="12" r="2" fill="currentColor"/>
                        <line x1="19" y1="5" x2="14" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <span data-i18n="navTrain">Train</span>
                </button>
                <button class="nav-item" id="nav-knowhow" data-screen="knowhow">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M12 8v1M12 11v5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span data-i18n="navKnowhow">Checkout Know-How</span>
                </button>
                <button class="nav-item" id="nav-premium" data-screen="premium">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                    </svg>
                    <span data-i18n="navPremium">Premium Checkouts</span>
                </button>
            </nav>

            <!-- Actions (right) -->
            <div class="topnav-actions">
                <div class="lang-toggle-group topnav-lang">
                    <button class="lang-toggle-btn" data-lang="en" title="English">
                        <span class="lang-flag">🇬🇧</span>
                        <span class="lang-code">EN</span>
                    </button>
                    <button class="lang-toggle-btn" data-lang="de" title="Deutsch">
                        <span class="lang-flag">🇩🇪</span>
                        <span class="lang-code">DE</span>
                    </button>
                </div>
                <button class="hamburger" id="hamburger" aria-label="Open menu">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                        <line x1="3" y1="6" x2="19" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="3" y1="11" x2="19" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="3" y1="16" x2="19" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>

        </div>

        <!-- Mobile dropdown menu -->
        <div class="mobile-menu" id="mobile-menu">
            <div class="mobile-menu-inner">
                <button class="nav-item" data-screen="play-setup">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                        <polygon points="6,3 20,12 6,21" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                    </svg>
                    <span data-i18n="navPlay">Play</span>
                </button>
                <button class="nav-item" data-screen="game">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
                        <circle cx="12" cy="12" r="6" stroke="currentColor" stroke-width="1.5"/>
                        <circle cx="12" cy="12" r="2" fill="currentColor"/>
                        <line x1="19" y1="5" x2="14" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <span data-i18n="navTrain">Train</span>
                </button>
                <button class="nav-item" data-screen="knowhow">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M12 8v1M12 11v5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <span data-i18n="navKnowhow">Checkout Know-How</span>
                </button>
                <button class="nav-item" data-screen="premium">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                    </svg>
                    <span data-i18n="navPremium">Premium Checkouts</span>
                </button>
                <div class="mobile-menu-footer">
                    <div class="nav-label" data-i18n="navSectionLanguage">Language</div>
                    <div class="lang-toggle-group">
                        <button class="lang-toggle-btn" data-lang="en" title="English">
                            <span class="lang-flag">🇬🇧</span>
                            <span class="lang-code">EN</span>
                        </button>
                        <button class="lang-toggle-btn" data-lang="de" title="Deutsch">
                            <span class="lang-flag">🇩🇪</span>
                            <span class="lang-code">DE</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </header>

    <!-- Main Content -->
    <div class="main-wrapper">

        <!-- Game Screen -->
        <div id="game-screen" class="screen active">
            <div class="game-layout">

                <div class="game-header">
                    <div class="stat-group">
                        <div class="stat-card" id="checkout-group">
                            <div class="stat-label" data-i18n="labelCheckout">Checkout</div>
                            <div class="stat-value accent" id="target-number">—</div>
                        </div>
                        <div class="stat-card" id="remaining-group">
                            <div class="stat-label" data-i18n="labelRemaining">Remaining</div>
                            <div class="stat-value" id="remaining-number">—</div>
                        </div>
                    </div>
                    <div class="view-toggles">
                        <button id="toggle-remaining-btn" class="toggle-chip active" data-i18n="toggleRemaining">Remaining</button>
                        <button id="toggle-numbers-btn" class="toggle-chip active" data-i18n="toggleNumbers">Numbers</button>
                    </div>
                </div>

                <div class="dartboard-wrapper">
                    <svg id="dartboard" viewBox="0 0 500 500" class="dartboard"></svg>
                </div>

                <div class="game-footer">
                    <div class="darts-display">
                        <div class="dart-slot" id="dart-0"></div>
                        <div class="dart-slot" id="dart-1"></div>
                        <div class="dart-slot" id="dart-2"></div>
                    </div>
                    <div class="game-actions">
                        <button id="reset-btn" class="btn btn-ghost" data-i18n="resetBtn">Reset</button>
                        <button id="skip-btn" class="btn btn-ghost" data-i18n="skipBtn">Skip</button>
                    </div>
                </div>

            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <div class="result-layout">

                <div class="result-header">
                    <div class="result-target-group">
                        <div class="stat-label" data-i18n="labelCheckoutTarget">Checkout Target</div>
                        <div class="stat-value accent" id="result-target-number">—</div>
                    </div>
                </div>

                <div id="result-status" class="result-status-banner"></div>

                <div class="checkouts-grid">
                    <div class="checkout-card" id="your-card">
                        <div class="checkout-label" data-i18n="labelYourCheckout">Your Checkout</div>
                        <div id="result-your-darts" class="checkout-display"></div>
                    </div>
                    <div class="checkout-card" id="premium-v1-card">
                        <div class="checkout-label" data-i18n="labelPremiumV1">Premium V.1</div>
                        <div id="premium-v1-darts" class="checkout-display"></div>
                    </div>
                    <div class="checkout-card" id="premium-v2-card">
                        <div class="checkout-label" data-i18n="labelPremiumV2">Premium V.2</div>
                        <div id="premium-v2-darts" class="checkout-display"></div>
                    </div>
                    <div class="checkout-card" id="premium-2dart-card">
                        <div class="checkout-label" data-i18n="label2DartVariant">2-Dart</div>
                        <div id="premium-2dart-darts" class="checkout-display"></div>
                    </div>
                </div>

                <button id="next-btn" class="btn btn-primary btn-full" data-i18n="nextBtn">Next Target</button>

            </div>
        </div>

        <!-- Premium Checkouts Screen -->
        <div id="premium-screen" class="screen">
            <div class="premium-layout" id="premium-page-content">
                <div class="pp-loading" id="pp-loading">
                    <span data-i18n="pp_loading">Loading…</span>
                </div>
            </div>
        </div>

        <!-- Play Setup Screen -->
        <div id="play-setup-screen" class="screen">
            <div class="setup-layout">

                <div class="setup-header">
                    <h1 class="setup-title" data-i18n="setupTitle">New Game</h1>
                </div>

                <div class="setup-section">
                    <div class="setup-label" data-i18n="setupMode">Game Mode</div>
                    <div class="setup-chips" id="setup-mode-chips">
                        <button class="setup-chip" data-mode="301">301</button>
                        <button class="setup-chip active" data-mode="501">501</button>
                        <button class="setup-chip" data-mode="701">701</button>
                        <button class="setup-chip" data-mode="1001">1001</button>
                    </div>
                </div>

                <div class="setup-section">
                    <div class="setup-section-row">
                        <div class="setup-label" data-i18n="setupPlayers">Players</div>
                        <button class="btn btn-ghost btn-sm" id="add-player-btn" data-i18n="setupAddPlayer">+ Add Player</button>
                    </div>
                    <div class="setup-players" id="setup-players"></div>
                </div>

                <div class="setup-footer">
                    <button class="btn btn-primary btn-full" id="start-x01-btn" data-i18n="setupStart">Start Game</button>
                </div>

            </div>
        </div>

        <!-- Play Game Screen (x01) -->
        <div id="play-game-screen" class="screen">
            <div class="x01-layout">

                <div class="x01-scoreboard" id="x01-scoreboard"></div>

                <div class="dartboard-wrapper">
                    <svg id="dartboard-x01" viewBox="0 0 600 600" class="dartboard"></svg>
                </div>

                <div class="x01-footer">
                    <div class="darts-display" id="x01-darts-row">
                        <div class="dart-slot" id="x01-dart-0"></div>
                        <div class="dart-slot" id="x01-dart-1"></div>
                        <div class="dart-slot" id="x01-dart-2"></div>
                    </div>
                    <div class="x01-turn-info">
                        <div class="x01-pts-value" id="x01-turn-score">0</div>
                        <div class="x01-pts-label" data-i18n="x01Pts">pts</div>
                    </div>
                    <div class="game-actions">
                        <button class="btn btn-ghost" id="x01-miss-btn" data-i18n="x01Miss">Miss</button>
                        <button class="btn btn-ghost" id="x01-undo-btn" data-i18n="x01Undo">Undo</button>
                        <button class="btn btn-primary" id="x01-next-btn" disabled data-i18n="x01Next">Next →</button>
                    </div>
                </div>

            </div>
        </div>

        <!-- Play Result Screen -->
        <div id="play-result-screen" class="screen">
            <div class="play-result-layout">

                <div class="winner-display">
                    <svg class="winner-trophy" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 8h24v20a12 12 0 01-24 0V8z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M10 8h10M44 8h10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M10 12C10 12 7 15 7 20a8 8 0 008 8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M54 12C54 12 57 15 57 20a8 8 0 01-8 8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        <line x1="32" y1="40" x2="32" y2="50" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M24 58h16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                        <path d="M26 50a6 6 0 0112 0" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                    <div class="winner-label" data-i18n="winnerLabel">Winner!</div>
                    <div class="winner-name" id="winner-name"></div>
                    <div class="winner-game" id="winner-game"></div>
                </div>

                <div class="play-result-actions">
                    <button class="btn btn-ghost btn-full" id="play-again-btn" data-i18n="playAgain">Play Again</button>
                    <button class="btn btn-primary btn-full" id="new-game-btn" data-i18n="newGame">New Game</button>
                </div>

            </div>
        </div>

        <!-- Know-How Screen -->
        <div id="knowhow-screen" class="screen">
            <div class="knowhow-layout">

                <div class="kh-section">
                    <h2 class="kh-heading" data-i18n="kh_s1_title">Was ist ein Checkout?</h2>
                    <p class="kh-body" data-i18n-html="kh_s1_body"></p>
                </div>

                <div class="kh-section">
                    <h2 class="kh-heading" data-i18n="kh_s2_title">Wie erreiche ich einen Checkout?</h2>
                    <p class="kh-intro" data-i18n="kh_s2_intro"></p>
                    <ul class="kh-list" id="kh-s2-list"></ul>
                </div>

                <div class="kh-section">
                    <h2 class="kh-heading" data-i18n="kh_s3_title">Was sind Premium Checkouts?</h2>
                    <p class="kh-body" data-i18n-html="kh_s3_body"></p>
                    <p class="kh-examples-title" data-i18n="kh_s3_examples_title"></p>
                    <ul class="kh-list kh-examples" id="kh-s3-list"></ul>
                    <p class="kh-body kh-outro" data-i18n-html="kh_s3_outro"></p>
                </div>

                <div class="kh-section">
                    <h2 class="kh-heading" data-i18n="kh_s4_title">Worauf sollte ich achten?</h2>
                    <ul class="kh-list" id="kh-s4-list"></ul>
                </div>

            </div>
        </div>

    </div>

    <script src="i18n.js"></script>
    <script src="checkouts.js"></script>
    <script src="dartboard.js"></script>
    <script src="app.js"></script>
</body>
</html>
